<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signage Player</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden; cursor: none;
  }
  .stage { position: fixed; inset: 0; background: #000; }
  video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
  }

  .msg {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    color: #cfd3da; background: #000;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    text-align: center; padding: 6vw;
  }
  .msg.show { display: flex; }
  .msg h1 { margin: 0; font-size: clamp(20px, 3vw, 34px); font-weight: 600; color: #fff; }
  .msg p  { margin: 0; font-size: clamp(14px, 1.6vw, 20px); color: #9aa0a8; max-width: 28ch; line-height: 1.5; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #4a4f57; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  #hud {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.85); color: #0f0; padding: 10px 18px;
    font-family: monospace; font-size: clamp(13px, 1.4vw, 20px);
    line-height: 1.7; z-index: 999; pointer-events: none;
  }
</style>
</head>
<body>
<div class="stage">
  <!-- Un solo elemento de video: evita competencia de decodificadores hardware en Samsung Tizen -->
  <video id="player" muted autoplay playsinline preload="auto"></video>
</div>

<div id="hud">▶ iniciando…</div>

<div class="msg" id="msg">
  <div class="dot"></div>
  <h1 id="msgTitle">Cargando…</h1>
  <p id="msgText"></p>
</div>

<script>
/* ============================================================
   CONFIGURACIÓN  —  edita SOLO estas líneas
   ============================================================ */
const CONFIG = {
  GITHUB_USER: "ha360",
  GITHUB_REPO: "Repositorio-proyecto-videos-signage",
  BRANCH:      "main",
  FOLDER:      "videos",

  MUTED:       false,          // false = con sonido | true = sin sonido
  FIT:         "contain",
  REFRESH_MIN: 20,
};
/* ============================================================
   De aquí para abajo no necesitas tocar nada.
   ============================================================ */

const VIDEO_RE   = /\.(mp4|webm|m4v|mov)$/i;
const RETRY_MS   = 15000;
const NOT_READY_S = 20;  // segundos esperando primer frame antes de saltar
const FREEZE_S    = 12;  // segundos de currentTime congelado antes de saltar
const NET_WAIT_S  = 60;  // segundos esperando buffer de red antes de saltar

const player   = document.getElementById("player");
const msgBox   = document.getElementById("msg");
const msgTitle = document.getElementById("msgTitle");
const msgText  = document.getElementById("msgText");
const hud      = document.getElementById("hud");

let playlist   = [];
let pendingList = null;
let idx        = 0;
let starting   = true;

let stallTimer    = null;
let lastTime      = -1;
let isWaiting     = false;
let notReadyCnt   = 0;
let pausedCnt     = 0;
let freezeCnt     = 0;
let netWaitCnt    = 0;
let cycleSuccess  = false;
let failedCycles  = 0;

/* ── Aplicar config inicial ── */
player.muted       = CONFIG.MUTED;
player.style.objectFit = CONFIG.FIT;

/* ── HUD ── */
const RS = ["EMPTY","IDLE","META","CUR","ENOUGH"];
function hudUpdate(tag) {
  const name = (player.dataset.url || "").split("/").pop().replace(/%20/g," ").slice(0,38);
  const rs   = RS[player.readyState] || player.readyState;
  const ct   = player.currentTime.toFixed(1);
  const buf  = player.buffered.length ? player.buffered.end(player.buffered.length-1).toFixed(1) : "0";
  const st   = player.paused ? "PAUSED" : (isWaiting ? "BUFFERING" : "PLAYING");
  hud.textContent = `[${idx+1}/${playlist.length}] ${name} | rs:${rs} t:${ct}s buf:${buf}s | ${st}${tag ? " | "+tag : ""}`;
}
setInterval(() => { if (!starting) hudUpdate(); }, 500);

/* ── Eventos del player ── */
player.addEventListener("ended",   () => advance());
player.addEventListener("error",   () => {
  const code = player.error ? player.error.code : "?";
  const msg  = player.error ? player.error.message : "";
  hudUpdate(`ERR ${code} ${msg}`);
  setTimeout(advance, 2000);
});
player.addEventListener("waiting", () => { isWaiting = true;  hudUpdate("WAITING-NET"); });
player.addEventListener("playing", () => { isWaiting = false; netWaitCnt = 0; });
player.addEventListener("stalled", () => { hudUpdate("STALLED"); });

/* Toque en pantalla activa/desactiva sonido */
document.body.addEventListener("click", () => { player.muted = !player.muted; });

/* ── Mensajes ── */
function showMsg(t, p) { msgTitle.textContent = t; msgText.textContent = p || ""; msgBox.classList.add("show"); }
function hideMsg()      { msgBox.classList.remove("show"); }

/* ── Carga del video actual ── */
function loadCurrent() {
  clearInterval(stallTimer);
  lastTime    = -1;
  isWaiting   = false;
  notReadyCnt = 0;
  pausedCnt   = 0;
  freezeCnt   = 0;
  netWaitCnt  = 0;

  const item = playlist[idx];
  if (!item) return;

  /* Liberar decodificador anterior antes de cargar el nuevo */
  player.pause();
  player.removeAttribute("src");
  player.load();

  /* Pequeña pausa para que Samsung libere el HW decoder */
  setTimeout(() => {
    player.src = item.url;
    player.dataset.url = item.url;
    player.load();

    const p = player.play();
    if (p && p.catch) p.catch(() => {
      setTimeout(() => player.play().catch(() => scheduleSkip(1500)), 500);
    });

    armStallWatch();
  }, 300);
}

/* ── Vigilancia de stall ── */
function armStallWatch() {
  clearInterval(stallTimer);
  stallTimer = setInterval(() => {
    /* 1. Nunca llegó a decodificar frames */
    if (player.readyState < 2) {
      notReadyCnt++;
      hudUpdate(`no-decode ${notReadyCnt}/${NOT_READY_S}`);
      if (notReadyCnt >= NOT_READY_S) advance();
      return;
    }
    /* 2. Tiene frames pero no arranca (autoplay bloqueado) */
    if (player.paused) {
      pausedCnt++;
      hudUpdate(`paused ${pausedCnt}/3`);
      if (pausedCnt >= 3) {
        pausedCnt = 0;
        player.muted = true;
        player.play().catch(() => advance());
      }
      return;
    }
    pausedCnt = 0;
    if (player.currentTime > 0) cycleSuccess = true;

    /* 3. currentTime no avanza */
    if (player.currentTime === lastTime) {
      if (isWaiting) {
        netWaitCnt++;
        hudUpdate(`buffering ${netWaitCnt}/${NET_WAIT_S}s`);
        if (netWaitCnt >= NET_WAIT_S) advance();
      } else {
        freezeCnt++;
        hudUpdate(`freeze ${freezeCnt}/${FREEZE_S}`);
        if (freezeCnt >= FREEZE_S) advance();
      }
    } else {
      freezeCnt  = 0;
      netWaitCnt = 0;
      lastTime   = player.currentTime;
    }
  }, 1000);
}

function scheduleSkip(ms) { setTimeout(advance, ms); }

/* ── Avanzar al siguiente video ── */
function advance() {
  if (!playlist.length) return;
  clearInterval(stallTimer);

  let next = (idx + 1) % playlist.length;
  if (next === 0) {
    if (!cycleSuccess) {
      failedCycles++;
      if (failedCycles >= 2) showMsg("Ningún video pudo reproducirse", "Revisa que los videos sean MP4 H.264. Reintentando…");
    } else {
      failedCycles = 0;
      hideMsg();
    }
    cycleSuccess = false;
    if (pendingList) { playlist = pendingList; pendingList = null; next = 0; }
  }
  idx = next;
  loadCurrent();
}

/* ── Arranque ── */
function startPlayback() {
  idx = 0;
  loadCurrent();
}

/* ── Fetch de la lista ── */
async function fetchList() {
  const { GITHUB_USER: u, GITHUB_REPO: r, BRANCH: b, FOLDER: f } = CONFIG;
  const base = `https://raw.githubusercontent.com/${u}/${r}/${b}/${f}`;
  let names = [];
  try {
    const res = await fetch(`${base}/manifest.json?cb=${Date.now()}`, { cache: "no-store" });
    if (res.ok) names = await res.json();
  } catch (_) {}

  if (!Array.isArray(names) || !names.length) {
    const api = `https://api.github.com/repos/${u}/${r}/contents/${f}?ref=${b}`;
    const res = await fetch(api, { headers: { Accept: "application/vnd.github+json" } });
    if (!res.ok) throw new Error("GitHub API " + res.status);
    const data = await res.json();
    names = data.filter(x => x.type === "file" && VIDEO_RE.test(x.name)).map(x => x.name);
  } else {
    names = names.filter(n => VIDEO_RE.test(n));
  }

  const files = names.map(n => ({ name: n, url: `${base}/${encodeURIComponent(n)}` }));

  let order = null;
  try {
    const ord = await fetch(`${base}/playlist.json?cb=${Date.now()}`, { cache: "no-store" });
    if (ord.ok) order = await ord.json();
  } catch (_) {}

  return orderVideos(files, order);
}

function orderVideos(files, order) {
  const alpha = arr => arr.slice().sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
  if (!Array.isArray(order) || !order.length) return alpha(files);
  const map = new Map(files.map(f => [f.name, f]));
  const out = [], used = new Set();
  for (const n of order) { if (map.has(n)) { out.push(map.get(n)); used.add(n); } }
  return out.concat(alpha(files.filter(f => !used.has(f.name))));
}

function sameList(a, b) {
  return a.length === b.length && a.every((x, i) => x.url === b[i].url);
}

async function boot() {
  if (starting) showMsg("Cargando…", "Buscando los videos");
  try {
    const list = await fetchList();
    if (!list.length) {
      if (starting) { showMsg("No hay videos todavía", `Sube archivos MP4 a la carpeta "${CONFIG.FOLDER}" del repositorio.`); setTimeout(boot, RETRY_MS); }
      return;
    }
    if (starting) {
      playlist = list; hideMsg(); startPlayback(); starting = false;
    } else if (!sameList(list, playlist)) {
      pendingList = list;
    }
  } catch (e) {
    console.warn("fetchList error:", e.message);
    if (starting) showMsg("Sin conexión", "Reintentando…");
    setTimeout(boot, RETRY_MS);
  }
}

boot();
setInterval(boot, CONFIG.REFRESH_MIN * 60 * 1000);
window.addEventListener("online", () => { if (starting) boot(); });
</script>
</body>
</html>
