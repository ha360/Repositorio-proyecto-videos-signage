<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signage Player</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden; cursor: none;
  }
  .stage { position: fixed; inset: 0; background: #000; }
  video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;            /* se ajusta desde CONFIG.FIT */
    background: #000;
    opacity: 0;
    transition: opacity 120ms linear;
  }
  video.show { opacity: 1; }

  /* Mensaje en pantalla solo para estados vacíos o de error */
  .msg {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    color: #cfd3da; background: #000;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    text-align: center; padding: 6vw;
  }
  .msg.show { display: flex; }
  .msg h1 { margin: 0; font-size: clamp(20px, 3vw, 34px); font-weight: 600; color: #fff; }
  .msg p  { margin: 0; font-size: clamp(14px, 1.6vw, 20px); color: #9aa0a8; max-width: 28ch; line-height: 1.5; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #4a4f57; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* HUD de diagnóstico — visible en pantalla para depuración remota */
  #hud {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.82); color: #0f0; padding: 10px 18px;
    font-family: monospace; font-size: clamp(13px, 1.4vw, 20px);
    line-height: 1.7; z-index: 999; pointer-events: none;
  }
</style>
</head>
<body>
<div class="stage">
  <video id="a" preload="auto" playsinline autoplay muted></video>
  <video id="b" preload="none" playsinline muted></video>
</div>

<div id="hud">▶ iniciando…</div>

<div class="msg" id="msg">
  <div class="dot"></div>
  <h1 id="msgTitle">Cargando…</h1>
  <p id="msgText"></p>
</div>

<script>
/* ============================================================
   CONFIGURACIÓN  —  edita SOLO estas líneas
   ============================================================ */
const CONFIG = {
  GITHUB_USER: "ha360",         // <-- tu usuario de GitHub
  GITHUB_REPO: "Repositorio-proyecto-videos-signage", // <-- el nombre del repositorio
  BRANCH:      "main",         // rama (normalmente "main")
  FOLDER:      "videos",       // carpeta donde van los videos

  MUTED:       true,           // true = sin sonido (recomendado para autoplay). false = con sonido
  FIT:         "contain",      // "contain" = ver completo | "cover" = llenar (puede recortar)
  REFRESH_MIN: 20,             // cada cuántos minutos revisa si hay videos nuevos
};
/* ============================================================
   De aquí para abajo no necesitas tocar nada.
   ============================================================ */

const VIDEO_RE = /\.(mp4|webm|m4v|mov)$/i;
const STALL_SECONDS = 12;        // si un video se queda "pegado", salta al siguiente
const RETRY_MS = 15000;          // reintento si no hay lista / falla la red

const elA = document.getElementById("a");
const elB = document.getElementById("b");
const msgBox = document.getElementById("msg");
const msgTitle = document.getElementById("msgTitle");
const msgText = document.getElementById("msgText");
const hud = document.getElementById("hud");

let activeEl = elA, bufferEl = elB;
let playlist = [];               // [{name, url}]
let pendingList = null;          // lista nueva, se aplica al cerrar un ciclo
let idx = 0;
let lastTime = 0, stallTimer = null;
let starting = true;
let isWaiting = false;           // true mientras el video espera más datos de red
let netStallCount = 0;           // segundos esperando red (límite: 60 s)
const NET_STALL_LIMIT = 60;

/* ── HUD de diagnóstico ── */
const RS = ["EMPTY","IDLE","HAVE_META","HAVE_CUR","ENOUGH"];
function updateHud(extra) {
  const v = activeEl;
  const name = (v.dataset.url || "").split("/").pop().replace(/%20/g," ").slice(0,40);
  const rs = RS[v.readyState] || v.readyState;
  const ct = v.currentTime.toFixed(1);
  const buf = v.buffered.length ? v.buffered.end(v.buffered.length-1).toFixed(1) : "0";
  const state = v.paused ? "PAUSED" : (isWaiting ? "BUFFERING" : "PLAYING");
  hud.textContent = `[${idx+1}/${playlist.length}] ${name} | rs:${rs} t:${ct}s buf:${buf}s | ${state}${extra ? " | "+extra : ""}`;
}
setInterval(() => { if (!starting) updateHud(); }, 500);

[elA, elB].forEach(v => {
  v.muted = CONFIG.MUTED;
  v.style.objectFit = CONFIG.FIT;
  v.addEventListener("ended",   () => { if (v === activeEl) goNext(); });
  v.addEventListener("error",   () => {
    if (v !== activeEl) return;
    const code = v.error ? v.error.code : "?";
    const msg  = v.error ? v.error.message : "unknown";
    updateHud(`ERR code:${code} ${msg}`);
    console.warn("Error de video, salto — code:", code, msg);
    setTimeout(goNext, 2000); // pausa breve para que el HUD sea legible
  });
  v.addEventListener("waiting", () => { if (v === activeEl) { isWaiting = true; updateHud("WAITING-NET"); } });
  v.addEventListener("playing", () => { if (v === activeEl) { isWaiting = false; netStallCount = 0; } });
  v.addEventListener("stalled", () => { if (v === activeEl) updateHud("STALLED"); });
});

/* Tocar la pantalla activa/desactiva el sonido (útil en sitio) */
document.body.addEventListener("click", () => {
  const m = !activeEl.muted;
  activeEl.muted = m; bufferEl.muted = m;
});

function showMsg(title, text) {
  msgTitle.textContent = title;
  msgText.textContent = text || "";
  msgBox.classList.add("show");
}
function hideMsg() { msgBox.classList.remove("show"); }

/* ---------- Carga de la lista de videos ---------- */
async function fetchList() {
  const { GITHUB_USER: u, GITHUB_REPO: r, BRANCH: b, FOLDER: f } = CONFIG;
  const base = `https://raw.githubusercontent.com/${u}/${r}/${b}/${f}`;

  // 1) Listar archivos desde manifest.json (CDN, sin límite de la API de GitHub)
  let names = [];
  try {
    const res = await fetch(`${base}/manifest.json?cb=${Date.now()}`, { cache: "no-store" });
    if (res.ok) names = await res.json();
  } catch (_) { /* sin manifest todavía */ }

  // Respaldo: si no existe manifest.json (primer uso, antes de subir algo desde el admin),
  // se usa la API de GitHub. Esta sí tiene límite de peticiones por hora.
  if (!Array.isArray(names) || !names.length) {
    const api = `https://api.github.com/repos/${u}/${r}/contents/${f}?ref=${b}`;
    const res = await fetch(api, { headers: { "Accept": "application/vnd.github+json" } });
    if (!res.ok) throw new Error("GitHub API " + res.status);
    const data = await res.json();
    names = data.filter(x => x.type === "file" && VIDEO_RE.test(x.name)).map(x => x.name);
  } else {
    names = names.filter(n => VIDEO_RE.test(n));
  }

  const files = names.map(name => ({ name, url: `${base}/${encodeURIComponent(name)}` }));

  // 2) Orden opcional desde videos/playlist.json
  let order = null;
  try {
    const ord = await fetch(`${base}/playlist.json?cb=${Date.now()}`, { cache: "no-store" });
    if (ord.ok) order = await ord.json();
  } catch (_) { /* no hay archivo de orden: usamos alfabético */ }

  return orderVideos(files, order);
}

function orderVideos(files, order) {
  const sortAlpha = arr =>
    arr.slice().sort((x, y) => x.name.localeCompare(y.name, undefined, { numeric: true }));

  if (!Array.isArray(order) || !order.length) return sortAlpha(files);

  const byName = new Map(files.map(f => [f.name, f]));
  const out = [], used = new Set();
  for (const name of order) {
    if (byName.has(name)) { out.push(byName.get(name)); used.add(name); }
  }
  const rest = sortAlpha(files.filter(f => !used.has(f.name)));
  return out.concat(rest);
}

function sameList(a, b) {
  if (a.length !== b.length) return false;
  return a.every((it, i) => it.name === b[i].name && it.url === b[i].url);
}

/* ---------- Reproducción ---------- */
function prepare(el, item, asActive) {
  if (!item) return;
  el.loop = (playlist.length === 1);
  el.muted = true; // siempre muted para garantizar autoplay en Tizen
  el.style.objectFit = CONFIG.FIT;
  el.preload = asActive ? "auto" : "none";
  if (el.dataset.url !== item.url) {
    el.dataset.url = item.url;
    el.src = item.url;
    el.load();
  }
}

function playEl(el) {
  el.muted = true; // asegurar muted antes del play (requerido por Chromium M94 en Tizen)
  el.preload = "auto";
  const p = el.play();
  if (p && typeof p.catch === "function") {
    p.catch(e => {
      console.warn("play() rechazado:", e.name, e.message);
      // DOMException NotAllowedError = política de autoplay
      // En Samsung Tizen URL Launcher, intentamos de nuevo tras breve pausa
      setTimeout(() => {
        el.play().catch(() => scheduleStall());
      }, 500);
    });
  }
}

const NOT_READY_SECONDS = 20;  // si el video nunca llega a decodificar un frame tras 20 s, se salta
const PAUSED_STUCK_SECONDS = 3; // si está listo pero no arranca (autoplay bloqueado), reintento rápido
let notReadyCount = 0;
let pausedStuckCount = 0;
let cycleHadSuccess = false;   // ¿algún video reprodujo bien en este ciclo completo?
let consecutiveFailedCycles = 0;

function armStallWatch() {
  clearInterval(stallTimer);
  lastTime = -1;
  notReadyCount = 0;
  pausedStuckCount = 0;
  isWaiting = false;
  netStallCount = 0;
  stallTimer = setInterval(() => {
    if (activeEl.readyState < 2) {
      notReadyCount++;
      updateHud(`no-decode ${notReadyCount}/${NOT_READY_SECONDS}`);
      if (notReadyCount >= NOT_READY_SECONDS) {
        notReadyCount = 0;
        console.warn("Video nunca decodificó, salto:", activeEl.dataset.url);
        goNext();
      }
      return;
    }
    if (activeEl.paused) {
      pausedStuckCount++;
      if (pausedStuckCount >= PAUSED_STUCK_SECONDS) {
        pausedStuckCount = 0;
        activeEl.muted = true;
        activeEl.play().catch(() => goNext());
      }
      return;
    }
    pausedStuckCount = 0;

    if (activeEl.currentTime > 0) cycleHadSuccess = true;

    if (activeEl.currentTime === lastTime) {
      if (isWaiting) {
        // El decoder está esperando datos de red — ser paciente
        netStallCount++;
        updateHud(`buffering… ${netStallCount}/${NET_STALL_LIMIT}s`);
        if (netStallCount >= NET_STALL_LIMIT) {
          netStallCount = 0;
          console.warn("Timeout de red (60 s), salto:", activeEl.dataset.url);
          goNext();
        }
      } else {
        // currentTime congelado sin waiting = el decoder se colgó
        activeEl._stallCount = (activeEl._stallCount || 0) + 1;
        updateHud(`freeze ${activeEl._stallCount}/${STALL_SECONDS}`);
        if (activeEl._stallCount >= STALL_SECONDS) {
          activeEl._stallCount = 0;
          console.warn("Decoder congelado, salto:", activeEl.dataset.url);
          goNext();
        }
      }
    } else {
      activeEl._stallCount = 0;
      netStallCount = 0;
      lastTime = activeEl.currentTime;
    }
  }, 1000);
}
function scheduleStall() { setTimeout(goNext, 1500); }

function goNext() {
  if (!playlist.length) return;

  // Al cerrar el ciclo (volver al inicio) aplicamos una lista nueva si hay
  let next = (idx + 1) % playlist.length;
  if (next === 0) {
    // Se completó un ciclo entero: si ningún video logró reproducirse,
    // es señal de un problema de formato/codec, no de un video puntual.
    if (!cycleHadSuccess) {
      consecutiveFailedCycles++;
      if (consecutiveFailedCycles >= 2) {
        showMsg(
          "Ningún video se pudo reproducir",
          "Revisa que los videos sean MP4 (H.264, 1920x1080 o menos). Esta pantalla no decodifica resoluciones 4K o perfiles muy pesados. Reintentando…"
        );
      }
    } else {
      consecutiveFailedCycles = 0;
      hideMsg();
    }
    cycleHadSuccess = false;
    if (pendingList) { playlist = pendingList; pendingList = null; next = 0; }
  }
  idx = next;

  // bufferEl debería tener el video ya cargado; aseguramos que sea el correcto
  prepare(bufferEl, playlist[idx], true);

  activeEl.classList.remove("show");
  activeEl.pause();
  activeEl.preload = "none"; // liberar buffer del video anterior

  bufferEl.classList.add("show");
  playEl(bufferEl);

  // intercambiar roles
  const tmp = activeEl; activeEl = bufferEl; bufferEl = tmp;

  // precargar metadata del siguiente (no todo el archivo, para no saturar la RAM del TV)
  prepare(bufferEl, playlist[(idx + 1) % playlist.length], false);

  armStallWatch();
}

function startPlayback() {
  idx = 0;
  prepare(activeEl, playlist[0], true);
  prepare(bufferEl, playlist[playlist.length > 1 ? 1 : 0], false);
  activeEl.classList.add("show");
  bufferEl.classList.remove("show");
  playEl(activeEl);
  armStallWatch();
}

function applyPendingNow() {
  if (!pendingList) return;
  playlist = pendingList;
  pendingList = null;
  bufferEl.pause();
  startPlayback();
}

/* ---------- Arranque y refresco ---------- */
async function boot() {
  if (starting) showMsg("Cargando…", "Buscando los videos");
  try {
    const list = await fetchList();
    if (!list.length) {
      // Sin videos: solo avisamos en el arranque. Si ya hay algo reproduciéndose,
      // ignoramos la lista vacía y mantenemos lo último en pantalla.
      if (starting) {
        showMsg("No hay videos todavía", `Sube archivos a la carpeta "${CONFIG.FOLDER}" del repositorio y aparecerán aquí solos.`);
        setTimeout(boot, RETRY_MS);
      }
      return;
    }
    if (starting) {
      playlist = list;
      hideMsg();
      startPlayback();
      starting = false;
    } else if (!sameList(list, playlist)) {
      // Hay cambios: se aplican al terminar el ciclo actual (sin cortar el video en curso)
      pendingList = list;
      // Excepción: con un solo video en bucle, "ended" nunca dispara,
      // así que aplicamos el cambio de inmediato.
      if (playlist.length === 1) applyPendingNow();
    }
  } catch (e) {
    console.warn("Fallo al cargar la lista:", e.message);
    if (starting) showMsg("Sin conexión", "No se pudo contactar al servidor. Reintentando…");
    setTimeout(boot, RETRY_MS);
  }
}

boot();
setInterval(boot, CONFIG.REFRESH_MIN * 60 * 1000);

/* Si la pantalla recupera red tras una caída, reintenta */
window.addEventListener("online", () => { if (starting) boot(); });
</script>
</body>
</html>
